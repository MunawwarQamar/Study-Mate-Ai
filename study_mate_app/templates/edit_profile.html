{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
        <h2>Edit Profile</h2>

        {% if messages %}
            <div class="alert alert-danger">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="first_name" class="form-label">First Name</label>
                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}" required>
            </div>

            <div class="mb-3">
                <label for="last_name" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password (Leave empty to keep current password)</label>
                <input type="password" class="form-control" id="password" name="password">
            </div>

            <div class="mb-3">
                <label for="profile_image" class="form-label">Profile Image</label>
                <input type="file" class="form-control" id="profile_image" name="profile_image">
                {% if user.profile_image %}
                    <img src="{{ user.profile_image.url }}" alt="Current Profile Image" class="img-thumbnail mt-2" style="width: 150px;">
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>

        <a href="{% url 'profile_page' %}" class="btn btn-secondary mt-3">Back to Profile</a>
    </div>


{% endblock %}
