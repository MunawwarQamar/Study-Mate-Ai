{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyMate AI{% endblock %}</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="{% block body_class %}{% endblock %}">


    <nav class="navbar navbar-expand-lg bg-white shadow-sm py-3">
        <div class="container-fluid d-flex align-items-center public-nav">
            <a href="/" class="brand">
                <span class="brand-mark">S</span>
                <span class="brand-text">StudyMate AI</span>
            </a>

            <div class="ms-auto">
                <a href="/" class="me-3 text-dark">Home</a>
                <a href="#" class="me-3 text-dark">Contact</a>
                <a href="/auth/" class="btn btn-outline-primary btn-sm">Login</a>
            </div>
        </div>
    </nav>


    {% block content %}{% endblock %}


    <footer class="text-center py-4 mt-5">
        <p class="mb-0 text-muted">
            © 2026 StudyMate AI. Built with focus, consistency, and smart learning.
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
