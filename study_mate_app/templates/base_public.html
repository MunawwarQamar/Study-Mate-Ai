{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudyMate AI{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'images/studymate_logo.jpg' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="{% block body_class %}{% endblock %}">


    <nav class="navbar navbar-expand-lg public-navbar shadow-sm py-3">
        <div class="container public-nav">
            <a href="/" class="brand public-brand">
                <img src="{% static 'images/studymate_logo.jpg' %}" alt="StudyMate AI" class="brand-logo">
                <span class="brand-text">StudyMate AI</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center text-end">
                    <li class="nav-item">
                        <a href="/" class="nav-link public-nav-link">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="/contact-us/" class="nav-link public-nav-link">Contact Us</a>
                    </li>
                    <li class="nav-item mt-2 mt-lg-0">
                        <a href="/auth/" class="btn btn-public-login">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    {% block content %}{% endblock %}


    <footer class="text-center py-4 mt-5">
        <p class="mb-0 text-muted">
            © 2026 StudyMate AI. Built with focus, consistency, and smart learning.
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
