{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-4">Add New Subject</h3>

                <form action="/subjects/add/" method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Subject Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Mathematics">
                        {% if errors.name %}
                            <small class="text-danger">{{ errors.name }}</small>
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Exam Date</label>
                        <input type="date" name="exam_date" class="form-control">
                        {% if errors.exam_date %}
                            <small class="text-danger">{{ errors.exam_date }}</small>
                        {% endif %}
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="">-- Select Priority --</option>
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                        {% if errors.priority %}
                            <small class="text-danger">{{ errors.priority }}</small>
                        {% endif %}
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100">Add Subject</button>
                        <a href="/subjects/" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
